name: Publish Package to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
      - README.md
      - CHANGELOG.md
      - LICENSE
      - src/**
      - vite.config.ts
      - tsconfig.json
      - tsconfig.build.json
      - .github/workflows/npm-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "package-name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package-version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm. Skipping publish."
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet."
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.should-publish == 'true'
        run: npm publish --access public
